<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CUET UG Smart Portal - 2026</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --blue: #004a99; --green: #27ae60; --red: #e74c3c; --gray: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: var(--gray); overflow-x: hidden; }
        .hidden { display: none !important; }
        .container { max-width: 98%; margin: 5px auto; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 1px 5px rgba(0,0,0,0.1); }
        .paper-card { border: 1px solid #ddd; padding: 8px; margin: 5px 0; display: flex; justify-content: space-between; align-items: center; border-radius: 5px; background: #fff; font-size: 13px; }
        .btn { padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; font-size: 14px; width: 100%; }
        .btn-blue { background: var(--blue); }
        .btn-red { background: var(--red); }
        .btn-small { width: auto; padding: 5px 10px; font-size: 11px; }
        .timer-strip { background: var(--blue); color: white; padding: 5px; text-align: center; font-weight: bold; font-size: 12px; position: sticky; top: 0; z-index: 100; }
        
        /* Standard UI */
        .official-q-box { padding: 10px; min-height: 150px; }
        .official-q-text { font-size: 14px; font-weight: bold; margin-bottom: 10px; line-height: 1.4; }
        .option-item { display: block; padding: 10px; margin: 6px 0; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; font-size: 13px; }
        .option-item.selected { background: #e3f2fd; border-color: var(--blue); color: var(--blue); font-weight: bold; }

        .p-nav-box { margin-top: 10px; border-top: 1px solid #eee; padding-top: 5px; }
        .p-grid { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 5px; }
        .p-btn { min-width: 35px; height: 35px; border: 1px solid #ccc; background: white; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; border-radius: 4px; flex-shrink: 0; }
        .p-btn.ans { background: var(--green); color: white; border: none; }
        .p-btn.active { border: 2px solid #000; font-weight: bold; background: #eee; }

        /* PAPER 8 UI */
        .special-q-text { font-size: 11px; line-height: 1.2; margin-bottom: 5px; color: #444; font-weight: bold; }
        .special-opt { display: inline-block; padding: 4px 10px; margin: 2px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; font-size: 10px; }
        
        /* CHAT STYLING */
        .log-box { margin-top: 5px; border-top: 2px solid var(--blue); display: flex; flex-direction: column; }
        .log-list { overflow-y: scroll; border: 1px solid #ccc; margin: 0; padding: 5px; background: #fff; font-size: 11px; display: flex; flex-direction: column; -webkit-overflow-scrolling: touch; }
        
        #exam-log-list { height: 75vh; } /* P8 Bada Chat */
        #submit-log-list { height: 180px; } /* P17 Chota Chat for Single Page */

        .input-container { display: flex; gap: 2px; padding: 5px; background: #eee; border: 1px solid #ccc; margin-top: -1px; border-radius: 0 0 4px 4px; }
        .log-item { padding: 4px 6px; border-bottom: 1px solid #f1f1f1; color: #222; word-wrap: break-word; line-height: 1.3; }
        
        .res-table { width: 100%; border-collapse: collapse; margin-top: 5px; font-size: 9px; }
        .res-table th, .res-table td { border: 1px solid #ddd; padding: 3px; text-align: center; }
    </style>
</head>
<body>

<div id="home-screen" class="container">
    <div style="text-align: center; margin-bottom: 10px;">
        <img src="https://nta.ac.in/img/nta_logo.png" height="25">
        <h2 style="color: var(--blue); font-size: 15px;">CUET UG PORTAL - 2026</h2>
    </div>
    <div id="loading" style="text-align:center; font-size: 11px;">Connecting...</div>
    <div id="paper-list"></div>
</div>

<div id="exam-ui" class="hidden">
    <div class="timer-strip">Timer: <span id="clock">60:00</span></div>
    
    <div id="p8-special-layout" class="hidden container">
        <p id="p8-q-text" class="special-q-text"></p>
        <div id="p8-options"></div>
        <div style="display: flex; gap: 5px; margin-top: 5px;">
            <button onclick="saveNext()" class="btn btn-blue btn-small">NEXT</button>
            <button onclick="finishExam()" class="btn btn-red btn-small">SUBMIT</button>
        </div>
        <div class="log-box">
            <b style="font-size: 11px; color: var(--blue); padding: 5px; display: block;">Observation Log (P8)</b>
            <div id="exam-log-list" class="log-list"></div>
            <div class="input-container">
                <input type="text" id="exam-log-input" style="flex:1; padding:8px; border:1px solid #bbb; font-size: 12px;" placeholder="Message...">
                <button onclick="sendExamEntry()" class="btn btn-blue btn-small">Send</button>
            </div>
        </div>
    </div>

    <div id="standard-layout" class="hidden container">
        <div class="official-q-box">
            <div id="off-q-label" style="color:var(--blue); font-size: 11px; font-weight: bold;">Question</div>
            <p id="off-q-text" class="official-q-text"></p>
            <div id="off-options"></div>
        </div>
        <div style="display: flex; gap: 8px;">
            <button onclick="saveNext()" class="btn btn-blue btn-small">Save & Next</button>
            <button onclick="finishExam()" class="btn btn-red btn-small" style="width: 30%;">Submit</button>
        </div>
        <div class="p-nav-box">
            <div id="off-palette" class="p-grid"></div>
        </div>
    </div>
</div>

<div id="result-screen" class="container hidden">
    <h2 style="color:var(--blue); font-size: 14px; margin: 5px 0;">Analysis</h2>
    <div id="res-summary" style="font-size: 12px; margin-bottom: 5px;"></div>
    
    <div id="p17-secret-section" class="hidden log-box">
        <p style="font-size: 12px; font-weight: bold; color: var(--blue); padding: 4px; margin: 0;">Paper Discussion Area</p>
        <div id="submit-log-list" class="log-list"></div>
        <div class="input-container">
            <input type="text" id="submit-log-input" style="flex:1; padding:6px; border:1px solid #bbb; font-size: 11px;" placeholder="Discuss here...">
            <button onclick="sendSubmitEntry()" class="btn btn-blue btn-small">Send</button>
        </div>
    </div>

    <button onclick="location.reload()" class="btn btn-blue btn-small" style="margin-top:5px;">Home</button>
    <table class="res-table">
        <thead><tr style="background:#eee;"><th>Q</th><th>Res</th></tr></thead>
        <tbody id="res-body"></tbody>
    </table>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA_vvq8m9k7equDneBmytg-e9Z6mZasSC4",
        databaseURL: "https://cuet-portal-5dd8a-default-rtdb.firebaseio.com",
        projectId: "cuet-portal-5dd8a",
        appId: "1:240480813227:web:edaaf3a486d4f0bde8f7ee"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let sessionKey = null, userChoices = [], currentQ = 0, activeTest = null;

    async function startJourney() {
        const newSession = database.ref('user_journeys').push();
        sessionKey = newSession.key;
        fetch('https://ipapi.co/json/').then(res => res.json()).then(data => {
            database.ref('user_tracking').push({ city: data.city, ip: data.ip, time: new Date().toLocaleString() });
        });
    }
    startJourney();

    database.ref('papers').on('value', (snap) => {
        document.getElementById('loading').style.display = 'none';
        const allPapers = snap.val() || {};
        const list = document.getElementById('paper-list');
        list.innerHTML = "";
        for(let id in allPapers) {
            list.innerHTML += `<div class="paper-card"><b>${allPapers[id].title}</b><button class="btn btn-blue btn-small" onclick="startTest('${id}', ${JSON.stringify(allPapers[id]).replace(/"/g, '&quot;')})">Open</button></div>`;
        }
    });

    function startTest(id, paperData) {
        activeTest = paperData;
        userChoices = new Array(activeTest.questions.length).fill(null);
        currentQ = 0;
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('exam-ui').classList.remove('hidden');

        if(activeTest.title.includes("8")) {
            document.getElementById('p8-special-layout').classList.remove('hidden');
            document.getElementById('standard-layout').classList.add('hidden');
            loadLogs('observations_paper_8', 'exam-log-list');
        } else {
            document.getElementById('standard-layout').classList.remove('hidden');
            document.getElementById('p8-special-layout').classList.add('hidden');
        }
        render();
        startTimer(3600);
    }

    function render() {
        const q = activeTest.questions[currentQ];
        if(activeTest.title.includes("8")) {
            document.getElementById('p8-q-text').innerText = "Q" + (currentQ + 1) + ": " + q.q;
            const optBox = document.getElementById('p8-options');
            optBox.innerHTML = q.options.map((opt, i) => `<div class="special-opt ${userChoices[currentQ] === i ? 'selected' : ''}" onclick="selectOpt(${i})">${opt}</div>`).join('');
        } else {
            document.getElementById('off-q-label').innerText = "Question " + (currentQ + 1);
            document.getElementById('off-q-text').innerText = q.q;
            const optBox = document.getElementById('off-options');
            optBox.innerHTML = q.options.map((opt, i) => `<div class="option-item ${userChoices[currentQ] === i ? 'selected' : ''}" onclick="selectOpt(${i})">${opt}</div>`).join('');
            updatePalette();
        }
    }

    function selectOpt(i) { userChoices[currentQ] = i; render(); }
    function saveNext() { if(currentQ < activeTest.questions.length-1) { currentQ++; render(); } }

    function updatePalette() {
        const pal = document.getElementById('off-palette');
        pal.innerHTML = activeTest.questions.map((_, i) => `<div class="p-btn ${userChoices[i] !== null ? 'ans' : ''} ${i === currentQ ? 'active' : ''}" onclick="currentQ=${i};render()">${i+1}</div>`).join('');
    }

    function finishExam() {
        if(!confirm("Submit?")) return;
        document.getElementById('exam-ui').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');

        if(activeTest.title.includes("17") && userChoices[0] === 1) {
            document.getElementById('p17-secret-section').classList.remove('hidden');
            loadLogs('observations_paper_17', 'submit-log-list');
        }

        let score = 0, correct = 0;
        activeTest.questions.forEach((q, i) => { if (userChoices[i] === q.a) { score += 5; correct++; } });
        document.getElementById('res-summary').innerHTML = `<b>Score: ${score}</b> | Correct: ${correct}`;
        document.getElementById('res-body').innerHTML = activeTest.questions.map((q, i) => `<tr><td>${i+1}</td><td>${userChoices[i]===q.a?'✅':'❌'}</td></tr>`).join('');
    }

    function startTimer(sec) {
        let timer = setInterval(() => {
            sec--;
            let m = Math.floor(sec/60), s = sec%60;
            document.getElementById('clock').innerText = `${m}:${s<10?'0':''}${s}`;
            if(sec <= 0 || document.getElementById('exam-ui').classList.contains('hidden')) clearInterval(timer);
        }, 1000);
    }

    function sendExamEntry() { sendData('observations_paper_8', 'exam-log-input'); }
    function sendSubmitEntry() { sendData('observations_paper_17', 'submit-log-input'); }
    function sendData(path, inputId) {
        const val = document.getElementById(inputId).value;
        if(!val.trim()) return;
        database.ref(path).push({ text: val, time: Date.now() });
        document.getElementById(inputId).value = "";
    }

    function loadLogs(path, listId) {
        database.ref(path).on('value', (snap) => {
            const list = document.getElementById(listId);
            if(!list) return;
            list.innerHTML = "";
            const data = snap.val();
            if(data) Object.keys(data).forEach(key => {
                list.innerHTML += `<div class="log-item" ondblclick="deleteItem('${path}', '${key}')">${data[key].text}</div>`;
            });
            list.scrollTop = list.scrollHeight;
        });
    }

    function deleteItem(path, id) {
        if(confirm("Delete?")) database.ref(path + '/' + id).remove();
    }
</script>
</body>
</html>
